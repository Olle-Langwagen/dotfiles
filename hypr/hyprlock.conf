source = ~/.config/hypr/hyprlock_colors.conf

background {
    monitor =
    path = ~/.cache/current_wallpaper.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.02
}

label {
    monitor =
    text = $TIME
    color = $primary
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    
    outer_color = $primary
    inner_color = $surface
    font_color = $text
    fail_color = $error 
    
    fade_on_empty = false
    placeholder_text = <i>Lösenord...</i>
    
    position = 0, -120
    halign = center
    valign = center
}
